# coding Profile 装配清单
# 来源仓库: badhope/AI
# 适用场景: 软件开发、Bug 修复、重构、测试、代码审查

profile:
  id: coding
  name: 软件开发规则
  source_repo: badhope/AI
  mutually_exclusive_with:
    - novel
    - interactive-novel

includes:
  core:
    - core/governance.md
    - core/interaction.md
    - core/profile-router.md
    - core/language-mediation.md
  profile:
    - profiles/coding/AGENTS.md
    - profiles/coding/docs/prompts/architect-subagent.md
    - profiles/coding/docs/prompts/engineer-subagent.md
    - profiles/coding/docs/prompts/critic-subagent.md
    - profiles/coding/docs/prompts/verifier-subagent.md
    - profiles/coding/docs/prompts/final-subagent.md
    - profiles/coding/docs/prompts/system-prompt.md
  skills:
    - profiles/coding/docs/skills/git-sop.md
    - profiles/coding/docs/skills/registry.md
    - profiles/coding/docs/skills/powershell-tips.md
    - profiles/coding/docs/skills/mcp-registry.md
    - profiles/coding/docs/skills/tool-skill-mcp.md

enables_capabilities:
  - research
  - testing
  - review
  - agent-governance

forbids_capabilities:
  - game-engine
  - worldbuilding
  - npc-simulation

activation_anchors:
  - pyproject.toml
  - package.json
  - requirements.txt
  - src/
  - tests/

intent_keywords:
  - 修复
  - 重构
  - 测试
  - 部署
  - 接口
  - Bug
  - CI
  - 代码
