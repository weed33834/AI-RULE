  - manuscript/
  - references.bib

intent_keywords:
  - paper
  - literature review
  - abstract
  - introduction
  - methodology
  - results
  - discussion
  - citation
  - submit
  - review
  - 论文
  - 文献综述
  - 摘要
  - 引言
  - 方法
  - 结果
  - 讨论
  - 引用
  - 投稿
  - 审稿
