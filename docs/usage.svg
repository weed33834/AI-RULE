<svg viewBox="0 0 680 390" width="680" height="390" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Rule Hub 使用思路</title>
<desc>克隆仓库 → 确定 Profile → 运行 sync 装配 → 引入项目 → AI 按统一规则工作</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="190" y="20" width="300" height="54" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="44" text-anchor="middle" font-size="14" fill="#042C53" font-weight="500">1. 克隆 Rule Hub 仓库</text>
<text x="340" y="62" text-anchor="middle" font-size="11" fill="#0C447C">git clone &amp; cd AI-RULE</text>
<line x1="340" y1="74" x2="340" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="190" y="100" width="300" height="54" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="340" y="124" text-anchor="middle" font-size="14" fill="#173404" font-weight="500">2. 确定 Profile</text>
<text x="340" y="142" text-anchor="middle" font-size="11" fill="#27500A">显式指令 或 项目锚点自动识别</text>
<line x1="340" y1="154" x2="340" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="150" y="180" width="380" height="64" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="204" text-anchor="middle" font-size="14" fill="#412402" font-weight="500">3. 运行 sync_rules.py 装配</text>
<text x="340" y="224" text-anchor="middle" font-size="11" fill="#633806">--profile X --tool all</text>
<text x="340" y="240" text-anchor="middle" font-size="11" fill="#633806">core + profile + skills + 能力包 → 5 工具文件</text>
<line x1="340" y1="244" x2="340" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="190" y="270" width="300" height="54" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="294" text-anchor="middle" font-size="14" fill="#26215C" font-weight="500">4. 引入生成文件到项目</text>
<text x="340" y="312" text-anchor="middle" font-size="11" fill="#3C3489">拷贝 或 git submodule</text>
<line x1="340" y1="324" x2="340" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="150" y="350" width="380" height="28" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="369" text-anchor="middle" font-size="13" fill="#2C2C2A" font-weight="500">5. AI 按统一规则工作（跨工具一致）</text>
</svg>
